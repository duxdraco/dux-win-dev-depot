name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $params = @{ Path = '.'; Recurse = $true }
          if (Test-Path ./PSScriptAnalyzerSettings.psd1) { $params.Settings = './PSScriptAnalyzerSettings.psd1' }
          $issues = Invoke-ScriptAnalyzer @params
          if ($issues) { $issues | Format-Table -AutoSize | Out-String | Write-Host }
          $severe = @($issues | Where-Object { $_.Severity -in 'Error', 'Warning' })
          foreach ($i in $severe) {
            Write-Host "::error file=$($i.ScriptPath),line=$($i.Line)::$($i.RuleName): $($i.Message)"
          }
          if ($severe.Count) { throw "$($severe.Count) PSScriptAnalyzer issue(s) at Error/Warning severity." }
          Write-Host "PSScriptAnalyzer: clean."
