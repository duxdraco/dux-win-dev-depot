name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Pester (PowerShell 7)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run test suite
        shell: pwsh
        run: ./tests/Invoke-Tests.ps1 -SkipAnalyzer
